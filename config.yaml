paths:
  raw: data/raw/
  masks: data/map_area_masks/
  patches: data/patches/
  annotations: data/annotations/
  predictions: data/predictions/
  stitched: data/stitched/
  outputs: data/outputs/
  models_base: models/base/
  models_finetuned: models/finetuned/
  logs: models/logs/
  parcel_points: data/parcel_points/

patchify:
  patch_size: 512         # px — boundaries/MapSAM use 512px patches directly;
                          # text model stitches 2×2 patches to 1024px before inference
  overlap: 0              # px between adjacent patches
  min_mask_coverage: 0.01 # fraction of patch that must fall within mask (0.01 = 1%)
  pad_value: 255          # fill value for edge patches (255 = white)

unet:
  inference_size: 256     # model input size; 512px patches are split into a 2×2 grid of
                          # 256px tiles (4 total) — matches training resolution exactly, no downsampling
  image_channels: 1       # grayscale
  loss_type: combined_focal_cldice
  threshold: 0.95         # from threshold calibration on validation set
  batch_size: 4

vectorise:
  boundaries:
    simplify_tolerance: 2.0  # Douglas-Peucker tolerance in CRS units (metres for BNG,
                             # pixels for non-georef). Increase to generalise more.
    min_length: 10.0         # discard lines shorter than this (same units as above)
    topology_repair:
      enabled: false         # set true to add bridging segments after vectorisation
      snap_distance: 15.0    # maximum gap to bridge in CRS units (metres for BNG)
                             # keep conservative — start low and increase if needed
                             # a good starting point is 3–5× simplify_tolerance
      angle_tolerance: null  # degrees; null = bridge any nearby endpoint pair
                             # set e.g. 25 to restrict to roughly collinear lines only
                             # (avoids bridging two unrelated boundaries at a corner)
  # MapSAM polygon features — any label becomes its own class
  # Per-feature overrides take precedence; "default" is used when no specific entry exists.
  features:
    default:
      simplify_tolerance: 2.0  # Douglas-Peucker tolerance in CRS units (metres for BNG)
      min_area: 25.0            # discard polygons smaller than this (same units squared)
    # Per-feature overrides — uncomment and adjust as needed:
    # water:
    #   simplify_tolerance: 3.0
    #   min_area: 50.0
    # building:
    #   simplify_tolerance: 1.0
    #   min_area: 10.0

mapsam:
  vit_name: vit_b
  img_size: 512
  num_classes: 1
  rank: 4          # DoRA rank — must match the value used when base weights were trained
  dice_param: 0.8       # weight for dice vs focal in combined loss (0.8 = 80% dice, 20% focal)
  predict_threshold: 0.5  # sigmoid threshold for binary mask during inference
  predict_batch_size: 4   # patches per GPU forward pass; reduce to 1-2 if OOM
  # No per-feature configuration needed — the feature name is taken directly from the
  # --feature CLI argument, and weights are resolved automatically in this order:
  #   1. models/finetuned/  (mapsam_<feature>*_best.pth)
  #   2. models/base/MapSAM/<feature>/  (feature-specific base weights)
  #   3. models/base/MapSAM/origional_weights/  (generic SAM DoRA fallback)
  # Annotation data is read from data/annotations/<feature>/<sheet>/
  finetune:
    epochs: 30
    batch_size: 2            # safe for ~4 GB GPU with 512px SAM ViT-B; reduce to 1 if OOM
    learning_rate: 0.0001    # much lower than base training (0.005) — small nudge to existing weights
    val_split: 0.15
    early_stopping_patience: 10
    seed: 1234

finetune:
  epochs: 50
  learning_rate: 0.0001       # lower than build_model default (1e-3) for fine-tuning
  val_split: 0.15             # fraction of patches held out for validation
  apl_tau: 3                  # coverage tolerance in pixels for APL / path-F1
  max_val_tiles: 200          # cap validation tiles per epoch for speed
  early_stopping_patience: 10 # stop if path_f1 doesn't improve for this many epochs
  # checkpoint_metric: path_f1  # always path_f1 — here for documentation only

feedback:
  # Feedback fine-tuning (step 07) — runs AFTER mending in QGIS
  # Run rasterise.py (maptools) then train.py (tf-gpu)
  replay_ratio: 0.4           # fraction of each batch drawn from ground-truth replay pool
                               # 0.4 = 40% GT tiles, 60% feedback tiles per batch
  feedback_loss_weight: 0.8   # loss weight for pseudo-label tiles (ground-truth = 1.0)
                               # reduces the influence of any uncorrected prediction errors
  freeze_encoder_blocks: 2    # freeze first N of 4 encoder stages (0 = none, 4 = all)
                               # blocks 1-2 encode low-level edge/texture features —
                               # freezing them preserves cross-map generalisability
  learning_rate: 1.0e-5       # much lower than initial fine-tune (1e-4) — small nudge only
  epochs: 20
  early_stopping_patience: 5  # stops when cross-sheet Path-F1 stops improving
  max_val_tiles: 200           # cap on validation tiles evaluated per epoch

annotation:
  # Every unique label drawn in labelme automatically becomes its own feature class.
  # The label name is used directly as the annotations subfolder (e.g. "water" → annotations/water/).
  #
  # boundary_label identifies which label uses linestrip rendering instead of filled polygons.
  # All other labels are rendered as filled polygons regardless of their shape_type.
  boundary_label: boundary
  line_width: 3       # px width used when rendering linestrip annotations into masks

parcels:
  # ── Point-seeded watershed parcel extraction (ACTIVE method) ────────────────
  # steps/04_predict/parcels/parcel_segment.py  +  steps/05_vectorise/parcels/parcel_vectorise.py
  #
  # No model training.  Consumes the full-sheet boundary raster already produced
  # by the lines pipeline (data/stitched/boundaries/<sheet>.tif) and the
  # apportionment centroid points, then partitions the sheet with a
  # marker-controlled watershed: each apportionment point is a seed, the
  # (smoothed) boundary lines are ridges, and every pixel is assigned to the
  # nearest enclosed parcel.  Parcel extent is defined by the boundaries, so it
  # handles wildly different parcel sizes natively, and N points → N parcels.
  points_file: Holnicote Apportionment Points.gpkg  # filename within paths.parcel_points/

  # Watershed surface shaping — these bridge the dashed/gappy boundaries that
  # made strict polygonisation fail.  The seeds provide topological closure; the
  # lines only need to bias where adjacent parcels are cut apart.
  boundary_smooth_sigma: 2.0   # Gaussian blur (px) turning dashed/broken lines into soft
                               #   continuous ridges. 0 = off. Raise to bridge bigger gaps.
  boundary_close_px: 3         # morphological closing (px) of the boundary before smoothing,
                               #   to join colinear dashes. 0 = off.
  seed_dilate_px: 4            # radius (px) each apportionment point seed is grown to (robustness)
  compactness: 0.0             # skimage watershed compactness. 0 = follow boundaries strictly;
                               #   small values (e.g. 1e-3) add a Voronoi-like pull that keeps
                               #   parcels sensible where the boundary is missing entirely.
  use_map_mask: true           # constrain the watershed to data/map_area_masks/<sheet> if present
  min_region_px: 64            # drop watershed regions smaller than this many px before vectorising

  # Hand-corrected boundaries: if a GeoPackage for the sheet exists in this folder,
  # its "boundaries" line layer is rasterised and used INSTEAD of the model raster.
  # (Override per-run with --no-mended.)
  mended_dir: data/mended outputs   # folder of QGIS-corrected boundary GeoPackages
  mended_line_width_px: 3           # px width to rasterise mended boundary lines at

  # Shared with parcel_vectorise.py (attribute join + GeoPackage write):
  min_area: 50.0               # m² — discard parcels smaller than this
  simplify_tolerance: 1.0      # Douglas-Peucker tolerance in CRS units (metres for BNG)

# ── ARCHIVED: point-prompted SAM parcel approach (superseded by watershed) ─────
# Kept for reference only. Scripts live in temp/sam_parcels/. Not read by any
# active script. To revive, restore temp/sam_parcels/* and rename these keys back
# to `parcels:` / `parcel_finetune:`.
sam_parcels_archived:
  points_file: Holnicote Apportionment Points.gpkg
  tile_size: 1024
  sam_input_size: 1024
  overlap: 128
  min_area: 50.0
  simplify_tolerance: 1.0
  max_neg_points: 6
  adaptive_scale: true
  border_margin_px: 4
  adaptive_max_fill: 0.80

parcel_finetune_archived:
  epochs: 40
  batch_size: 1
  learning_rate: 0.00005
  val_split: 0.15
  early_stopping_patience: 12
  seed: 1234
  replay_ratio: 0.4
  min_zoom_area_px: 1500
  neg_points: 0
  neg_ring_px: 48

text:
  # MapTextPipeline text spotting (run via MapReader's MapTextRunner)
  # Requires the "New-MapReader" conda environment.
  cfg_file: models/MapTextPipeline/configs/ViTAEv2_S/rumsey/final_rumsey.yaml
  tile_n: 1           # assemble tile_n × tile_n patches into one image before inference.
                      # tile_n=1 means one forward pass per patch (recommended for ≤8GB VRAM).
                      # tile_n=2 gives ~3-4× throughput but requires ~16GB VRAM for 1024px tiles
                      # — the RTX 3050 (4GB) OOMs at tile_n=2. Leave at 1 for this GPU.
  min_ioa: 0.7        # deduplication IoA threshold — higher = tighter (keeps more boxes)
  device: default     # "cuda", "cpu", or "default" (auto-selects cuda if available)
  # Confidence threshold is set in the config yaml above (TRANSFORMER.INFERENCE_TH_TEST: 0.4)
  # Weight search order:
  #   1. --weights CLI argument
  #   2. models/base/MapTextPipeline/*.pth   (most recently modified)
  #   3. models/finetuned/*text*.pth

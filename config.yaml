paths:
  raw: data/raw/
  masks: data/map_area_masks/
  patches: data/patches/
  annotations: data/annotations/
  predictions: data/predictions/
  stitched: data/stitched/
  outputs: data/outputs/
  models_base: models/base/
  models_finetuned: models/finetuned/
  logs: models/logs/

patchify:
  patch_size: 512         # px — boundaries/MapSAM use 512px patches directly;
                          # text model stitches 2×2 patches to 1024px before inference
  overlap: 0              # px between adjacent patches
  min_mask_coverage: 0.01 # fraction of patch that must fall within mask (0.01 = 1%)
  pad_value: 255          # fill value for edge patches (255 = white)

unet:
  inference_size: 256     # model input size; 512px patches are split into a 2×2 grid of
                          # 256px tiles (4 total) — matches training resolution exactly, no downsampling
  image_channels: 1       # grayscale
  loss_type: combined_focal_cldice
  threshold: 0.95         # from threshold calibration on validation set
  batch_size: 4

vectorise:
  boundaries:
    simplify_tolerance: 2.0  # Douglas-Peucker tolerance in CRS units (metres for BNG,
                             # pixels for non-georef). Increase to generalise more.
    min_length: 10.0         # discard lines shorter than this (same units as above)
    topology_repair:
      enabled: false         # set true to add bridging segments after vectorisation
      snap_distance: 15.0    # maximum gap to bridge in CRS units (metres for BNG)
                             # keep conservative — start low and increase if needed
                             # a good starting point is 3–5× simplify_tolerance
      angle_tolerance: null  # degrees; null = bridge any nearby endpoint pair
                             # set e.g. 25 to restrict to roughly collinear lines only
                             # (avoids bridging two unrelated boundaries at a corner)
  # MapSAM polygon features — any label becomes its own class
  # Per-feature overrides take precedence; "default" is used when no specific entry exists.
  features:
    default:
      simplify_tolerance: 2.0  # Douglas-Peucker tolerance in CRS units (metres for BNG)
      min_area: 25.0            # discard polygons smaller than this (same units squared)
    # Per-feature overrides — uncomment and adjust as needed:
    # water:
    #   simplify_tolerance: 3.0
    #   min_area: 50.0
    # building:
    #   simplify_tolerance: 1.0
    #   min_area: 10.0

mapsam:
  vit_name: vit_b
  img_size: 512
  num_classes: 1
  rank: 4          # DoRA rank — must match the value used when base weights were trained
  dice_param: 0.8       # weight for dice vs focal in combined loss (0.8 = 80% dice, 20% focal)
  predict_threshold: 0.5  # sigmoid threshold for binary mask during inference
  predict_batch_size: 4   # patches per GPU forward pass; reduce to 1-2 if OOM
  # No per-feature configuration needed — the feature name is taken directly from the
  # --feature CLI argument, and weights are resolved automatically in this order:
  #   1. models/finetuned/  (mapsam_<feature>*_best.pth)
  #   2. models/base/MapSAM/<feature>/  (feature-specific base weights)
  #   3. models/base/MapSAM/origional_weights/  (generic SAM DoRA fallback)
  # Annotation data is read from data/annotations/<feature>/<sheet>/
  finetune:
    epochs: 30
    batch_size: 2            # safe for ~4 GB GPU with 512px SAM ViT-B; reduce to 1 if OOM
    learning_rate: 0.0001    # much lower than base training (0.005) — small nudge to existing weights
    val_split: 0.15
    early_stopping_patience: 10
    seed: 1234

finetune:
  epochs: 50
  learning_rate: 0.0001       # lower than build_model default (1e-3) for fine-tuning
  val_split: 0.15             # fraction of patches held out for validation
  apl_tau: 3                  # coverage tolerance in pixels for APL / path-F1
  max_val_tiles: 200          # cap validation tiles per epoch for speed
  early_stopping_patience: 10 # stop if path_f1 doesn't improve for this many epochs
  # checkpoint_metric: path_f1  # always path_f1 — here for documentation only

annotation:
  # Every unique label drawn in labelme automatically becomes its own feature class.
  # The label name is used directly as the annotations subfolder (e.g. "water" → annotations/water/).
  #
  # boundary_label identifies which label uses linestrip rendering instead of filled polygons.
  # All other labels are rendered as filled polygons regardless of their shape_type.
  boundary_label: boundary
  line_width: 3       # px width used when rendering linestrip annotations into masks

text:
  # MapTextPipeline text spotting (run via MapReader's MapTextRunner)
  # Requires the "New-MapReader" conda environment.
  cfg_file: models/MapTextPipeline/configs/ViTAEv2_S/rumsey/final_rumsey.yaml
  min_ioa: 0.7        # deduplication IoA threshold — higher = tighter (keeps more boxes)
  device: default     # "cuda", "cpu", or "default" (auto-selects cuda if available)
  # Confidence threshold is set in the config yaml above (TRANSFORMER.INFERENCE_TH_TEST: 0.4)
  # Weight search order:
  #   1. --weights CLI argument
  #   2. models/base/MapTextPipeline/*.pth   (most recently modified)
  #   3. models/finetuned/*text*.pth

# polygons.yml — pinned full export for the polygons environment
# MapSAM polygon fine-tuning and inference + MapTextPipeline text spotting
# Python 3.12, PyTorch 2.2.2+cu121, CUDA 12.1 (conda toolkit + pip cu12 wheels)
#
# Development machine: WSL2, Ubuntu, NVIDIA RTX 3050 4GB, Driver 581.95, CUDA 12.1
# Exported: 2026-05-13
#
# Non-PyPI packages (not reproducible from this file alone):
#   maptextpipeline==0.0.1  ->  pip install -e models/MapTextPipeline/
#   detectron2==0.6         ->  see envs/README.md for install command
#
# monai is pinned to 1.3.2 — do not upgrade. Versions >=1.4 require torch>=2.4
# and will silently upgrade torch if installed without a pin, breaking mapreader
# and torchvision.
#
# To recreate exactly: conda env create -f envs/polygons.yml
# For a portable minimal spec: see envs/polygons-base.yml


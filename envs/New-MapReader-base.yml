# New-MapReader-base — portable minimal spec for MapReader + MapTextPipeline
# For exact reproduction on linux-64 + CUDA 12.1: use New-MapReader.yml instead.
# This file is a starting point for adapting to different machines/CUDA versions.
#
# GPU required: CUDA 12.1+ recommended (tested on 12.1, RTX 3050 4GB)
# For a different CUDA version, change the --index-url suffix (cu118, cu121, cu124, etc.)
# and match the torch/torchvision versions from https://pytorch.org/get-started/locally/
#
# NON-PyPI installs required BEFORE or AFTER this file:
#   1. maptextpipeline (local):
#        pip install -e models/MapTextPipeline/
#   2. detectron2 (Facebook, build from source for your CUDA version):
#        pip install git+https://github.com/facebookresearch/detectron2.git
#      OR use a pre-built wheel from:
#        https://github.com/facebookresearch/detectron2/releases
#   3. mapreader is on PyPI (included below) but verify the version matches
#      what was used when the MapTextPipeline weights were trained.
#
# numpy is pinned to <2.0 — detectron2 0.6 breaks with numpy 2.x.

name: New-MapReader
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
      # PyTorch — adjust index URL for your CUDA version
      - torch==2.2.2+cu121
          --index-url https://download.pytorch.org/whl/cu121
      - torchvision==0.17.2+cu121
          --index-url https://download.pytorch.org/whl/cu121
      - torchaudio==2.2.2+cu121
          --index-url https://download.pytorch.org/whl/cu121
      # numpy pinned — detectron2 incompatible with numpy 2.x
      - "numpy>=1.24,<2.0"
      # MapReader ecosystem
      - mapreader>=1.8
      - timm>=1.0
      # Geospatial
      - geopandas>=0.14
      - rasterio>=1.4
      - shapely>=2.0
      - pyproj>=3.6
      - fiona>=1.9
      - pyogrio>=0.7
      # Image / science
      - scikit-image>=0.21
      - scikit-learn>=1.3
      - scipy>=1.10
      - opencv-python>=4.8
      - pillow>=10.0
      - imageio>=2.28
      # Deep learning utilities
      - tensorboard>=2.14
      - safetensors>=0.4
      - huggingface-hub>=0.20
      # Jupyter
      - jupyterlab>=4.0
      - ipywidgets>=8.0
      - ipykernel
      # General utilities
      - pyyaml
      - tqdm
      - requests
      - pandas>=2.0
      - matplotlib>=3.7
      - omegaconf>=2.3
      - hydra-core>=1.3
      - fvcore
      - iopath
      - pycocotools
      - yacs
      - antlr4-python3-runtime==4.9.3   # pinned — hydra/omegaconf require exactly 4.9.x

# polygons-base.yml — portable minimal spec for the polygons environment
# MapSAM polygon fine-tuning and inference + MapTextPipeline text spotting
# Python 3.12, PyTorch 2.2.2+cu121, CUDA 12.1
#
# Constraints:
#   - monai must be pinned to ==1.3.2 — versions >=1.4 require torch>=2.4 and will
#     silently upgrade torch if installed without a pin, breaking mapreader + torchvision
#   - numpy must be <2.0 — detectron2 0.6 breaks with numpy 2.x
#   - antlr4-python3-runtime must be exactly 4.9.3 — hydra/omegaconf require exactly 4.9.x
#   - torch must be installed from the PyTorch cu121 index (handled by --extra-index-url)
#
# CUDA via conda (nvidia/label/cuda-12.1.0):
#   Only cuda-nvcc and cuda-cudart are included here — enough for building detectron2
#   extensions without pulling in the full 8GB development toolkit.
#   If using prebuilt detectron2 wheels (see below), you can remove the nvidia channel
#   and both cuda-* conda packages entirely.
#
# Non-PyPI installs required after creating this env:
#
#   1. maptextpipeline (local install from repo):
#      pip install -e models/MapTextPipeline/
#
#   2. detectron2 — option A: prebuilt wheel (recommended, no CUDA toolkit needed):
#      pip install detectron2 \
#        -f https://dl.fbaipublicfiles.com/detectron2/wheels/cu121/torch2.2/index.html
#
#      option B: build from source (requires cuda-nvcc via conda above):
#      pip install detectron2 --no-build-isolation \
#        -f https://github.com/facebookresearch/detectron2/releases
#
# To create:   conda env create -f envs/polygons-base.yml
# To activate: conda activate polygons

name: polygons
channels:
  - conda-forge
  - nvidia/label/cuda-12.1.0
  - defaults
dependencies:
  - python=3.12
  - cuda-nvcc=12.1.66      # needed to compile detectron2 CUDA extensions (option B above)
  - cuda-cudart=12.1.55    # CUDA runtime headers
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.2.2+cu121
      - torchvision==0.17.2
      - monai==1.3.2             # pinned — do not upgrade without testing torch compatibility
      - einops>=0.6
      - segment-anything==1.0
      - mapreader==1.8.2
      - numpy>=1.24,<2.0
      - antlr4-python3-runtime==4.9.3   # strictly pinned — hydra/omegaconf require exactly 4.9.x
      - hydra-core>=1.3,<2.0
      - omegaconf>=2.3,<3.0
      - rasterio>=1.3
      - geopandas>=0.14
      - shapely>=2.0
      - pyproj>=3.4
      - pyogrio>=0.7
      - fiona>=1.9
      - scikit-image>=0.21
      - scikit-learn>=1.3
      - scipy>=1.10
      - opencv-python>=4.8
      - matplotlib>=3.7
      - pandas>=2.0
      - tqdm>=4.65
      - pyyaml>=6.0
      - pillow>=9.0
      - h5py>=3.10
      - timm>=0.9
      - tensorboard>=2.14
      - yacs>=0.1.8
      - pycocotools>=2.0
      - editdistance>=0.6
      - requests>=2.28
      - huggingface-hub>=0.20

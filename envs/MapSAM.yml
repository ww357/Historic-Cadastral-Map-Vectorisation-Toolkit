# MapSAM — SAM ViT-B + DoRA fine-tuning environment
# Used for: MapSAM feature prediction (steps 04/05 mapsam predict/finetune)
# Recreate with: conda env create -f envs/MapSAM.yml
# Exported from WSL (Ubuntu) with: conda env export --no-builds -n MapSAM
# Platform: linux-64
#
# GPU: NVIDIA GeForce RTX 3050 Laptop (4 GB VRAM)
# Driver: 581.95  |  CUDA runtime: 13.0  |  nvcc (toolkit): 12.1.66
# PyTorch: 1.9.1+cu111  |  Python: 3.8.20
# Note: PyTorch wheel targets CUDA 11.1 — older than the system toolkit but
#       compatible via driver forward-compatibility. Python 3.8 is EOL but
#       required by the pinned package versions (monai 1.1.0, scipy 1.7.3).
#       The +cu111 wheel must be installed from the legacy PyTorch index:
#         pip install torch==1.9.1+cu111 torchvision==0.10.1+cu111
#               --index-url https://download.pytorch.org/whl/cu111


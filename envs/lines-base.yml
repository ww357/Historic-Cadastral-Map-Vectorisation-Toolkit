# lines-base.yml — portable minimal spec for the lines environment
# U-Net boundary fine-tuning, inference, and feedback (steps 03, 04, 07 — boundaries)
# Python 3.11, TensorFlow 2.21, Keras 3.13
#
# CUDA is managed entirely by pip — do NOT add cudatoolkit via conda.
# tensorflow installs the correct nvidia-*-cu12 wheels automatically as dependencies.
#
# Constraints:
#   - numpy must be <2.0 — TF 2.21 and associated packages require numpy 1.x
#   - tensorflow==2.21.0 pinned — Keras 3.x API is not backward compatible
#   - keras==3.13.2 pinned — checkpoint format changed between Keras 2 and 3
#   - h5py>=3.10 required for Keras .weights.h5 checkpoint format
#
# After creating the env, also install:
#   pip install skan        # required by steps/05_vectorise/boundaries/vectorise.py
#                           # not installed automatically — add to this file once confirmed
#
# To create:  conda env create -f envs/lines-base.yml
# To activate: conda activate lines

name: lines
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      - tensorflow==2.21.0
      - keras==3.13.2
      - numpy>=1.24,<2.0
      - h5py>=3.10
      - patchify>=0.2.3
      - rasterio>=1.3
      - geopandas>=1.0
      - shapely>=2.0
      - pyproj>=3.4
      - pyogrio>=0.7
      - fiona>=1.9
      - scikit-image>=0.21
      - scikit-learn>=1.3
      - scipy>=1.10
      - skan>=0.11
      - imageio>=2.30
      - tifffile>=2023.1
      - opencv-python>=4.8
      - matplotlib>=3.7
      - pandas>=2.0
      - tqdm>=4.65
      - pyyaml>=6.0
      - click>=8.1
      - affine>=2.4
      - requests>=2.28
      - pillow>=9.0

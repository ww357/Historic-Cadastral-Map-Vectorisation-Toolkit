# maptools-base — portable minimal spec for the geospatial processing environment
# For exact reproduction on linux-64: use maptools.yml instead.
# This file is a starting point for adapting to different machines/OS.
#
# No GPU required — CPU-only environment.
# Should work on linux-64, osx-arm64, and win-64 with minor solver adjustments.
#
# Key packages:
#   fiona, rasterio, geopandas, gdal, shapely  — geospatial I/O and geometry
#   scikit-image, scikit-learn, scipy           — image processing and ML
#   labelme                                     — annotation GUI (step 02)
#   skan                                        — skeleton → polyline (step 05)
#   onnxruntime                                 — ONNX inference (osam, step 02 SAM assist)
#   numba                                       — JIT acceleration

name: maptools
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Geospatial stack — install via conda-forge for correct GDAL/PROJ linkage
  - gdal>=3.8
  - fiona>=1.9
  - rasterio>=1.3
  - geopandas>=1.0
  - pyproj>=3.6
  - shapely>=2.0
  - pyogrio>=0.7
  # Numerical / image
  - numpy>=1.24,<2.0
  - scipy>=1.10
  - scikit-image>=0.21
  - scikit-learn>=1.3
  - pillow>=10.0
  - matplotlib>=3.7
  - pandas>=2.0
  - tifffile>=2023.0
  - imageio>=2.28
  # Utilities
  - pyyaml
  - tqdm
  - requests
  - click
  - networkx
  - joblib
  - numba>=0.57
  - natsort
  - loguru
  - pip:
      - labelme>=6.0          # annotation GUI (step 02) — pip only
      - skan>=0.11            # skeleton graph → polylines (step 05)
      - osam>=0.3             # SAM-assisted annotation in labelme
      - onnxruntime>=1.14     # ONNX inference backend for osam
      - imgviz>=1.7
